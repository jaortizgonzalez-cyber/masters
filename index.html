<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#0b6e4f" />
  <title>🐊 Polla Masters Augusta 2026</title>

  <style>
    :root {
      --bg0: #020a06; --bg1: #05120b; --card: rgba(15, 27, 21, 0.95);
      --text: #e6f0eb; --muted: #9fb8ad; --green: #0b6e4f; --green2: #0f8a63;
      --gold: #f4c430; --success: #22c55e; --shadow: rgba(0,0,0,0.7);
      --radius: 24px; --sans: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    /* ====== ANIMACIONES DE ENTRADA ====== */
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes shine {
      0% { left: -100%; }
      100% { left: 100%; }
    }

    .fade-in { animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) both; }

    /* ====== SISTEMA CHOMP RECARGADO ====== */
    .chomp-overlay {
      position: fixed; inset: 0; z-index: 10000; pointer-events: none;
      display: flex; align-items: center; justify-content: center;
      background: radial-gradient(circle, rgba(11,110,79,0.5) 0%, transparent 70%);
      opacity: 0; transition: opacity 0.5s ease;
    }
    .chomp-overlay.active { opacity: 1; }
    .chomp-msg {
      text-align: center; transform: scale(0); 
      transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .chomp-overlay.active .chomp-msg { transform: scale(1); }
    .chomp-text {
      font-size: clamp(3.5rem, 12vw, 7rem); font-weight: 1000; color: var(--gold);
      text-shadow: 0 0 40px rgba(244,196,48,0.5), 5px 5px 0px var(--bg0);
      line-height: 0.9; margin: 0;
    }

    /* ====== ESTILOS BASE ====== */
    body {
      margin: 0; color: var(--text); font-family: var(--sans); background: var(--bg0);
      overflow-x: hidden;
    }

    .glow {
      position: fixed; inset: 0; z-index: 0;
      background: 
        radial-gradient(circle at 15% 15%, rgba(15,138,99,0.2), transparent 40%),
        radial-gradient(circle at 85% 85%, rgba(244,196,48,0.1), transparent 40%);
    }

    header, .container { position: relative; z-index: 5; max-width: 1000px; margin: 0 auto; padding: 20px; }

    .hero {
      background: linear-gradient(165deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02));
      border: 1px solid rgba(255,255,255,0.15); border-radius: var(--radius);
      padding: 35px; box-shadow: 0 30px 60px var(--shadow); backdrop-filter: blur(20px);
      text-align: center;
    }

    .badge {
      display: inline-block; padding: 6px 16px; border-radius: 50px;
      background: linear-gradient(90deg, var(--green), var(--green2));
      font-size: 11px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase;
      margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }

    /* ====== LEADERBOARD WOW ====== */
    .leaderboard {
      margin: 30px 0; border-radius: var(--radius); overflow: hidden;
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 20px 40px var(--shadow);
    }

    .rank-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 18px 25px; border-bottom: 1px solid rgba(255,255,255,0.05);
      cursor: pointer; transition: all 0.3s; position: relative; overflow: hidden;
    }
    .rank-row:hover { background: rgba(255,255,255,0.05); padding-left: 35px; }

    .rank-row.leader {
      background: linear-gradient(90deg, rgba(244,196,48,0.15), transparent);
      border-left: 4px solid var(--gold);
    }
    .rank-row.leader::after {
      content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
      animation: shine 3s infinite;
    }

    /* ====== CARDS ====== */
    .grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
    @media(min-width: 750px) { .grid { grid-template-columns: 1fr 1fr; } }

    .card {
      background: var(--card); border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius); padding: 25px; transition: 0.3s;
    }
    .card:hover { border-color: var(--gold); transform: translateY(-5px); }

    .avatar {
      width: 48px; height: 48px; border-radius: 16px;
      background: linear-gradient(135deg, var(--green2), var(--green));
      display: flex; align-items: center; justify-content: center;
      font-weight: 1000; font-size: 18px; box-shadow: 0 8px 15px rgba(0,0,0,0.3);
    }

    .pick-item {
      display: flex; justify-content: space-between; padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px;
    }

    /* MODAL */
    .modal {
      position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
      z-index: 10000; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px);
    }
    .modal.show { display: flex; }
    .sheet {
      width: min(500px, 90%); background: #0a1610; border-radius: 30px;
      border: 1px solid var(--gold); padding: 35px; box-shadow: 0 0 50px rgba(244,196,48,0.2);
    }

    .btn {
      border: none; cursor: pointer; padding: 14px 28px; border-radius: 18px;
      font-weight: 1000; color: white; background: var(--green);
      box-shadow: 0 10px 20px rgba(0,0,0,0.4); transition: 0.3s;
    }
    .btn:hover { background: var(--green2); transform: scale(1.05); }

    .confetti {
      position: fixed; width: 8px; height: 8px; z-index: 10001;
      animation: fall 3s linear forwards;
    }
    @keyframes fall { to { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
  </style>
</head>

<body>
  <div class="glow"></div>

  <div class="chomp-overlay" id="chompOverlay">
    <div class="chomp-msg">
      <p class="chomp-text">🐊 CHOMP!</p>
      <p id="winnerName" style="font-size: 1.5rem; font-weight: 900; margin-top: 10px; color: white;"></p>
    </div>
  </div>

  <header class="fade-in">
    <div class="hero">
      <div class="badge">Augusta National 2026</div>
      <h1 style="font-size: 38px; margin: 0; font-weight: 1000; line-height: 1;">POLLA MASTERS</h1>
      <p id="totalPot" style="color: var(--gold); font-size: 22px; font-weight: 900; margin-top: 15px;">💰 —</p>
      <div style="margin-top: 25px;">
        <button class="btn" onclick="copyWhatsApp()">📋 COPIAR RANKING</button>
      </div>
    </div>
  </header>

  <div class="container fade-in" style="animation-delay: 0.2s;">
    <div class="leaderboard" id="ranking"></div>
    <div class="grid" id="cards"></div>
  </div>

  <div class="modal" id="modal" onclick="closeModal()">
    <div class="sheet" onclick="event.stopPropagation()">
      <div id="mBody"></div>
      <button class="btn" style="width: 100%; margin-top: 30px;" onclick="closeModal()">VOLVER</button>
    </div>
  </div>

  <script>
    const data = {
      leaderboard: {}, 
      bettors: [
        { name:"Ronnie Sanchez",  picks:["Scottie Scheffler","Jon Rahm","Xander Schauffele","Cameron Young","Hideki Matsuyama"]},
        { name:"Juan Ardila",     picks:["Scottie Scheffler","Bryson DeChambeau","Ludvig Åberg","Tommy Fleetwood","Jon Rahm"]},
        { name:"Andrés Ortiz",    picks:["Scottie Scheffler","Jon Rahm","Rory McIlroy","Xander Schauffele","Bryson DeChambeau"]},
        { name:"Paul Franco",     picks:["Scottie Scheffler","Rory McIlroy","Tommy Fleetwood","Bryson DeChambeau","Nicolás Echavarría"]},
        { name:"Felipe Bernal",   picks:["Rory McIlroy","Ludvig Åberg","Brooks Koepka","Viktor Hovland","Xander Schauffele"]},
        { name:"German Ramos",    picks:["Scottie Scheffler","Rory McIlroy","Jon Rahm","Ludvig Åberg","Xander Schauffele"]},
        { name:"Fernando Fierro", picks:["Scottie Scheffler","Bryson DeChambeau","Jon Rahm","Rory McIlroy","Ludvig Åberg"]},
        { name:"Mauricio Castillo", picks:["Rory McIlroy","Scottie Scheffler","Ludvig Åberg","Robert MacIntyre","Matt Fitzpatrick"]},
        { name:"Hugo Castañeda",  picks:["Rory McIlroy","Scottie Scheffler","Nicolás Echavarría","Xander Schauffele","Collin Morikawa"]},
        { name:"Edwin González",  picks:["Scottie Scheffler","Jon Rahm","Bryson DeChambeau","Rory McIlroy","Xander Schauffele"]},
        { name:"Jesús Rojas",     picks:["Scottie Scheffler","Jon Rahm","Ludvig Åberg","Rory McIlroy","Xander Schauffele"]},
        { name:"Diego Niño",      picks:["Scottie Scheffler","Jon Rahm","Collin Morikawa","Rory McIlroy","Ludvig Åberg"]}
      ]
    };

    const parseMoney = s => s ? Number(s.replace(/[^0-9.-]+/g,"")) : 0;
    const fmtUSD = n => new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(n);

    function computeRanked(){
      return data.bettors.map(b => {
        const total = b.picks.reduce((acc, p) => acc + parseMoney(data.leaderboard[p]), 0);
        return { ...b, total };
      }).sort((a,b) => b.total - a.total);
    }

    function triggerChomp(name) {
      const overlay = document.getElementById("chompOverlay");
      document.getElementById("winnerName").textContent = `¡${name.toUpperCase()} LÍDER! 🏆`;
      overlay.classList.add("active");
      
      for(let i=0; i<80; i++) {
        const c = document.createElement("div");
        c.className = "confetti";
        c.style.left = Math.random() * 100 + "vw";
        c.style.top = "-10px";
        c.style.background = i % 2 === 0 ? "var(--gold)" : "var(--success)";
        c.style.animationDelay = Math.random() * 3 + "s";
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 6000);
      }
      setTimeout(() => overlay.classList.remove("active"), 3000);
    }

    function render(){
      const ranked = computeRanked();
      document.getElementById("totalPot").textContent = `💰 Pozo: ${new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',maximumFractionDigits:0}).format(data.bettors.length * 50000)}`;

      // Lanzar Chomp automático al cargar si hay datos
      if (ranked[0].total > 0) {
        setTimeout(() => triggerChomp(ranked[0].name), 1000);
      }

      document.getElementById("ranking").innerHTML = ranked.map((t,i) => `
        <div class="rank-row ${i===0?'leader':''}" onclick="openModalByIndex(${i})">
          <div style="display:flex; align-items:center; gap:15px;">
            <span style="font-weight:1000; font-family:serif; font-size:18px; color:var(--gold)">${i+1}</span>
            <span style="font-weight:1000; font-size:16px;">${t.name}</span>
          </div>
          <span style="color:var(--gold); font-weight:1000; font-family:monospace; font-size:16px;">${fmtUSD(t.total)}</span>
        </div>
      `).join("");

      document.getElementById("cards").innerHTML = ranked.map((t, idx) => `
        <div class="card fade-in" style="animation-delay: ${0.3 + (idx*0.1)}s">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <div style="display:flex; align-items:center; gap:12px;">
              <div class="avatar">${t.name.split(" ").map(n=>n[0]).join("")}</div>
              <span style="font-weight:1000; font-size:16px;">${t.name}</span>
            </div>
            <div style="text-align:right">
               <div style="font-size:10px; color:var(--muted)">USD ACUMULADO</div>
               <div style="color:var(--gold); font-weight:1000; font-size:18px;">${fmtUSD(t.total)}</div>
            </div>
          </div>
          ${t.picks.map(p => `
            <div class="pick-item">
              <span style="color:var(--muted)">${p}</span>
              <span style="font-weight:900; color:${parseMoney(data.leaderboard[p]) > 0 ? 'var(--success)' : 'white'}">
                ${data.leaderboard[p] || "$0"}
              </span>
            </div>
          `).join("")}
        </div>
      `).join("");
    }

    function openModalByIndex(idx){
      const t = computeRanked()[idx];
      document.getElementById("mBody").innerHTML = `
        <div style="text-align:center; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:20px; margin-bottom:20px;">
          <h2 style="color:var(--gold); margin:0; font-size:28px;">${t.name}</h2>
          <p style="font-size:22px; font-weight:1000; margin:5px 0;">Total: ${fmtUSD(t.total)}</p>
        </div>
        ${t.picks.map(p => `
          <div class="pick-item">
            <span>${p}</span>
            <span style="font-weight:1000; color:var(--success)">${data.leaderboard[p] || "$0"}</span>
          </div>
        `).join("")}
      `;
      document.getElementById("modal").classList.add("show");
    }

    function closeModal(){ document.getElementById("modal").classList.remove("show"); }

    fetch("./leaderboard.json?ts="+Date.now())
      .then(r => r.json())
      .then(j => { data.leaderboard = j; render(); })
      .catch(() => render());

    function copyWhatsApp(){
      const ranked = computeRanked();
      let txt = `🐊 POLLA MASTERS 2026\n`;
      ranked.forEach((t,i)=> txt += `${i+1}. ${t.name}: ${fmtUSD(t.total)}\n`);
      navigator.clipboard.writeText(txt);
      alert("Copiado ✅");
    }
  </script>
</body>
</html>
