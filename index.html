<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#0b6e4f" />
  <title>🐊 Polla Masters Augusta 2026</title>

  <style>
    :root{
      --bg0:#03110a; --bg1:#07150e; --card:#0f1b15; --card2:#111f18;
      --text:#e6f0eb; --muted:#9fb8ad; --green:#0b6e4f; --green2:#0f8a63;
      --gold:#f4c430; --success:#22c55e; --shadow: rgba(0,0,0,.55);
      --radius2: 22px; --sans: system-ui, -apple-system, sans-serif;
      --mono: ui-monospace, monospace;
    }

    /* ====== ANIMACIÓN CHOMP & CONFETTI ====== */
    .chomp-overlay {
      position: fixed; inset: 0; z-index: 10000; pointer-events: none;
      display: flex; align-items: center; justify-content: center;
      background: radial-gradient(circle, rgba(11,110,79,0.3) 0%, transparent 70%);
      opacity: 0; transition: opacity 0.4s;
    }
    .chomp-overlay.active { opacity: 1; }
    .chomp-msg {
      font-size: clamp(3rem, 10vw, 6rem); font-weight: 1000; color: var(--gold);
      text-shadow: 0 0 30px rgba(244,196,48,0.6), 4px 4px 0px var(--bg0);
      transform: scale(0); transition: transform 0.5s cubic-bezier(0.17, 0.89, 0.32, 1.49);
      text-align: center;
    }
    .chomp-overlay.active .chomp-msg { transform: scale(1); }

    .confetti {
      position: absolute; width: 10px; height: 10px; background: var(--gold);
      top: -20px; opacity: 0; animation: fall 3s linear forwards;
    }
    @keyframes fall {
      0% { transform: translateY(0) rotate(0); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    * { box-sizing: border-box; }
    body {
      margin: 0; color: var(--text); font-family: var(--sans);
      background: linear-gradient(180deg, var(--bg0), var(--bg1) 55%, var(--bg0));
      overflow-x: hidden;
    }

    header, .container { max-width: 1100px; margin: 0 auto; padding: 20px 18px; }

    .hero {
      border-radius: var(--radius2); border: 1px solid rgba(255,255,255,.1);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      padding: 20px; box-shadow: 0 18px 60px var(--shadow); backdrop-filter: blur(8px);
    }

    .leaderboard {
      margin: 20px 0; position: sticky; top: 12px; z-index: 10;
      border-radius: var(--radius2); border: 1px solid rgba(255,255,255,.12);
      background: linear-gradient(135deg, rgba(11,110,79,.98), rgba(15,138,99,.94));
      padding: 15px; backdrop-filter: blur(8px); box-shadow: 0 20px 50px var(--shadow);
    }

    .rank-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px; border-radius: 14px; background: rgba(0,0,0,.22);
      border: 1px solid rgba(255,255,255,.12); margin-bottom: 8px; cursor: pointer;
    }
    .rank-row.leader { border-color: var(--gold); box-shadow: 0 0 15px rgba(244,196,48,0.2); }

    .grid { display: grid; grid-template-columns: 1fr; gap: 16px; margin-top: 20px; }
    @media(min-width: 768px) { .grid { grid-template-columns: 1fr 1fr; } }

    .card {
      background: linear-gradient(180deg, var(--card), var(--card2));
      border: 1px solid rgba(255,255,255,.1); border-radius: var(--radius2);
      padding: 18px;
    }

    .avatar {
      width: 42px; height: 42px; border-radius: 50%;
      background: linear-gradient(135deg, var(--green), var(--green2));
      display: flex; align-items: center; justify-content: center; font-weight: 1000;
    }

    .pick-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,.03); font-size: 14px;
    }

    .modal {
      position: fixed; inset: 0; display: none; align-items: center; 
      justify-content: center; z-index: 1000; background: rgba(0,0,0,.85); padding: 18px;
    }
    .modal.show { display: flex; }
    .sheet { 
      width: min(500px, 100%); background: var(--bg1); 
      border-radius: 24px; border: 1px solid var(--gold); padding: 24px; 
    }

    .btn {
      appearance: none; border: none; cursor: pointer; padding: 10px 15px;
      border-radius: 12px; font-weight: 950; color: white; background: var(--green);
    }
  </style>
</head>

<body>
  <div class="chomp-overlay" id="chompOverlay">
    <div class="chomp-msg" id="chompMsg">🐊 CHOMP!<br>¡LÍDER ABSOLUTO! 🏆</div>
  </div>

  <header>
    <div class="hero">
      <h1>Polla Masters 2026 🐊</h1>
      <p id="potBig" style="color:var(--gold); font-weight:900; font-size:18px;">—</p>
      <button class="btn" onclick="copyWhatsApp()">📋 Compartir WhatsApp</button>
    </div>
  </header>

  <div class="container">
    <div class="leaderboard">
      <h2 style="margin:0 0 10px; font-size:18px;">🏆 Clasificación General</h2>
      <div id="ranking"></div>
    </div>
    <div class="grid" id="cards"></div>
  </div>

  <div class="modal" id="modal" onclick="closeModal()">
    <div class="sheet" onclick="event.stopPropagation()">
      <div id="mBody"></div>
      <button class="btn" style="width:100%; margin-top:20px;" onclick="closeModal()">Cerrar</button>
    </div>
  </div>

  <script>
    const data = {
      leaderboard: {}, 
      bettors: [
        { name:"Ronnie Sanchez",  picks:["Scottie Scheffler","Jon Rahm","Xander Schauffele","Cameron Young","Hideki Matsuyama"]},
        { name:"Juan Ardila",     picks:["Scottie Scheffler","Bryson DeChambeau","Ludvig Åberg","Tommy Fleetwood","Jon Rahm"]},
        { name:"Andrés Ortiz",    picks:["Scottie Scheffler","Jon Rahm","Rory McIlroy","Xander Schauffele","Bryson DeChambeau"]},
        { name:"Paul Franco",     picks:["Scottie Scheffler","Rory McIlroy","Tommy Fleetwood","Bryson DeChambeau","Nicolás Echavarría"]},
        { name:"Felipe Bernal",   picks:["Rory McIlroy","Ludvig Åberg","Brooks Koepka","Viktor Hovland","Xander Schauffele"]},
        { name:"German Ramos",    picks:["Scottie Scheffler","Rory McIlroy","Jon Rahm","Ludvig Åberg","Xander Schauffele"]},
        { name:"Fernando Fierro", picks:["Scottie Scheffler","Bryson DeChambeau","Jon Rahm","Rory McIlroy","Ludvig Åberg"]},
        { name:"Mauricio Castillo", picks:["Rory McIlroy","Scottie Scheffler","Ludvig Åberg","Robert MacIntyre","Matt Fitzpatrick"]},
        { name:"Hugo Castañeda",  picks:["Rory McIlroy","Scottie Scheffler","Nicolás Echavarría","Xander Schauffele","Collin Morikawa"]},
        { name:"Edwin González",  picks:["Scottie Scheffler","Jon Rahm","Bryson DeChambeau","Rory McIlroy","Xander Schauffele"]},
        { name:"Jesús Rojas",     picks:["Scottie Scheffler","Jon Rahm","Ludvig Åberg","Rory McIlroy","Xander Schauffele"]},
        { name:"Diego Niño",      picks:["Scottie Scheffler","Jon Rahm","Collin Morikawa","Rory McIlroy","Ludvig Åberg"]}
      ]
    };

    const parseMoney = s => s ? Number(s.replace(/[^0-9.-]+/g,"")) : 0;
    const fmtUSD = n => new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(n);

    function computeRanked(){
      return data.bettors.map(b => {
        const total = b.picks.reduce((acc, p) => acc + parseMoney(data.leaderboard[p]), 0);
        return { ...b, total };
      }).sort((a,b) => b.total - a.total);
    }

    function render(){
      const ranked = computeRanked();
      document.getElementById("potBig").textContent = `Pozo: ${new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',maximumFractionDigits:0}).format(data.bettors.length * 50000)}`;

      document.getElementById("ranking").innerHTML = ranked.map((t,i) => `
        <div class="rank-row ${i===0?'leader':''}" onclick="openModalByIndex(${i})">
          <span style="font-weight:900;">${i+1}</span>
          <span style="flex-grow:1; font-weight:1000; margin-left:10px;">${t.name}</span>
          <span style="color:var(--gold); font-weight:1000; font-family:var(--mono);">${fmtUSD(t.total)}</span>
        </div>
      `).join("");

      document.getElementById("cards").innerHTML = ranked.map(t => `
        <div class="card">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <div style="display:flex; gap:10px; align-items:center;">
              <div class="avatar">${t.name.split(" ").map(n=>n[0]).join("")}</div>
              <span style="font-weight:1000;">${t.name}</span>
            </div>
            <span style="color:var(--gold); font-weight:1000;">${fmtUSD(t.total)}</span>
          </div>
          ${t.picks.map(p => `
            <div class="pick-row">
              <span style="color:var(--muted)">${p}</span>
              <span style="font-weight:900; color:${parseMoney(data.leaderboard[p]) > 0 ? 'var(--success)' : 'white'}">
                ${data.leaderboard[p] || "$0"}
              </span>
            </div>
          `).join("")}
        </div>
      `).join("");
    }

    // --- LOGICA DE ANIMACION ---
    function triggerChomp(name) {
      const overlay = document.getElementById("chompOverlay");
      document.getElementById("chompMsg").innerHTML = `🐊 CHOMP!<br>${name.toUpperCase()} LÍDER 🏆`;
      overlay.classList.add("active");
      
      // Crear confeti
      for(let i=0; i<50; i++) {
        const c = document.createElement("div");
        c.className = "confetti";
        c.style.left = Math.random() * 100 + "vw";
        c.style.delay = Math.random() * 2 + "s";
        c.style.background = ["#f4c430", "#22c55e", "#ffffff"][Math.floor(Math.random()*3)];
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 4000);
      }
      setTimeout(() => overlay.classList.remove("active"), 2500);
    }

    function openModalByIndex(idx){
      const t = computeRanked()[idx];
      if(idx === 0) triggerChomp(t.name); // Activar si es el líder

      document.getElementById("mBody").innerHTML = `
        <h2 style="color:var(--gold); text-align:center;">${t.name}</h2>
        <p style="text-align:center; font-weight:1000; font-size:20px;">${fmtUSD(t.total)}</p>
        <div style="margin-top:20px;">
          ${t.picks.map(p => `
            <div class="pick-row">
              <span>${p}</span>
              <span style="font-weight:900;">${data.leaderboard[p] || "$0"}</span>
            </div>
          `).join("")}
        </div>
      `;
      document.getElementById("modal").classList.add("show");
    }

    function closeModal(){ document.getElementById("modal").classList.remove("show"); }

    fetch("./leaderboard.json?ts="+Date.now())
      .then(r => r.json())
      .then(j => { data.leaderboard = j; render(); })
      .catch(() => render());

    function copyWhatsApp(){
      const ranked = computeRanked();
      let txt = `🐊 POLLA MASTERS 2026\n\n`;
      ranked.forEach((t,i)=> txt += `${i+1}. ${t.name}: ${fmtUSD(t.total)}\n`);
      navigator.clipboard.writeText(txt);
    }
  </script>
</body>
</html>
