<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Polla Masters Augusta 2026</title>

<style>
:root{
  --green:#0b6e4f;
  --green-soft:#0f8a63;
  --bg:#07150e;
  --card:#111c17;
  --text:#e6f0eb;
  --muted:#9fb8ad;
  --gold:#f4c430;
  --silver:#cbd5e1;
  --bronze:#fb7185;
  --danger:#ef4444;
  --success:#22c55e;
}

/* RESET */
*{box-sizing:border-box}
body{
  margin:0;
  color:var(--text);
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial;
  background:
    radial-gradient(1200px 500px at 20% 0%, rgba(15,138,99,.25), transparent 60%),
    linear-gradient(180deg,#04110b,#07150e 60%);
}

/* HEADER */
header{
  max-width:1100px;
  margin:auto;
  padding:24px 20px;
}
.badge{
  background:linear-gradient(135deg,var(--green),var(--green-soft));
  padding:6px 12px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
  display:inline-block;
}
h1{
  margin:14px 0 6px;
  font-size:28px;
  font-weight:900;
}
.subtitle{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
.chip{
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.12);
  border-radius:999px;
  padding:4px 10px;
  font-size:12px;
  font-weight:800;
}

/* CAIMÁN watermark */
.gator-watermark{
  position:fixed;
  right:-80px;
  top:120px;
  opacity:.12;
  pointer-events:none;
}

/* CONTAINER */
.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

/* LEADERBOARD */
.leaderboard{
  background:linear-gradient(135deg,var(--green),var(--green-soft));
  border-radius:16px;
  padding:16px;
  position:sticky;
  top:10px;
}
.rank-row{
  display:flex;
  justify-content:space-between;
  padding:10px;
  margin-bottom:6px;
  background:rgba(0,0,0,.25);
  border-radius:10px;
  cursor:pointer;
}
.rank-row:hover{background:rgba(0,0,0,.35)}
.gold{color:var(--gold)}
.silver{color:var(--silver)}
.bronze{color:var(--bronze)}
.good{color:var(--success)}
.bad{color:var(--danger)}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr;
  gap:14px;
  margin-top:20px;
}
@media(min-width:900px){
  .grid{grid-template-columns:1fr 1fr}
}
.card{
  background:var(--card);
  border-radius:16px;
  padding:14px;
}
.card-head{
  display:flex;
  justify-content:space-between;
  margin-bottom:8px;
}
.players{
  border-top:1px dashed rgba(255,255,255,.15);
  margin-top:8px;
  padding-top:8px;
}
.player{
  display:flex;
  justify-content:space-between;
  font-size:13px;
  padding:4px 0;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:none;
  align-items:flex-end;
  justify-content:center;
}
.modal.show{display:flex}
.sheet{
  background:var(--card);
  width:100%;
  max-width:680px;
  border-radius:18px;
  padding:14px;
}
.close{
  float:right;
  cursor:pointer;
  font-weight:900;
}

/* BUTTON */
button{
  background:rgba(0,0,0,.35);
  border:1px solid rgba(255,255,255,.18);
  color:white;
  padding:8px 12px;
  border-radius:10px;
  font-weight:900;
  cursor:pointer;
}
button:hover{opacity:.9}
</style>
</head>

<body>

<!-- 🐊 CAIMÁN AGRESIVO -->
<div class="gator-watermark">
<svg width="320" height="200" viewBox="0 0 340 220" xmlns="http://www.w3.org/2000/svg">
  <circle cx="170" cy="110" r="104" fill="#0b6e4f"/>
  <path d="M70 132 C92 86 170 56 242 80 C282 94 286 140 250 156 C196 181 118 174 86 152 Z" fill="#22c55e"/>
  <path d="M92 154 C140 182 202 184 246 160 C226 188 166 206 122 186 Z" fill="#0f8a63"/>
  <path d="M138 162 l10 24 l10-24 zM170 168 l10 24 l10-24 zM202 168 l10 24 l10-24 z" fill="#fff"/>
  <ellipse cx="214" cy="106" rx="12" ry="10" fill="#07150e"/>
</svg>
</div>

<header>
<span class="badge">🏌️ MASTERS AUGUSTA 2026 · POLLA</span>
<h1>Leaderboard de Apostadores</h1>

<div class="subtitle">
<span class="chip" id="chipStatus">—</span>
<span class="chip">Regla: total más bajo</span>
<span class="chip" id="chipPot">💰 —</span>
</div>
</header>

<div class="container">

<div class="leaderboard">
<div style="display:flex;justify-content:space-between;align-items:center">
<strong>🏆 Ranking</strong>
<button onclick="copyWhatsApp()">📋 Copiar WhatsApp</button>
</div>
<div id="ranking"></div>
</div>

<div class="grid" id="cards"></div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="sheet">
<div class="close" onclick="closeModal()">✕</div>
<div id="modalContent"></div>
</div>
</div>

<script>
const data = {
  dateLabel: "Jueves · Ronda 1",
  status: "En juego",
  stakeCOP: 50000,
  leaderboard:{
    "Scottie Scheffler":null,
    "Jon Rahm":null,
    "Rory McIlroy":null,
    "Xander Schauffele":null,
    "Bryson DeChambeau":null,
    "Ludvig Åberg":null,
    "Tommy Fleetwood":null,
    "Cameron Young":null,
    "Hideki Matsuyama":null,
    "Nicolás Echavarría":null,
    "Brooks Koepka":null,
    "Viktor Hovland":null,
    "Collin Morikawa":null,
    "Robert MacIntyre":null,
    "Matt Fitzpatrick":null
  },
  bettors:[
    {name:"Ronnie Sanchez",picks:["Scottie Scheffler","Jon Rahm","Xander Schauffele","Cameron Young","Hideki Matsuyama"]},
    {name:"Juan Ardila",picks:["Scottie Scheffler","Bryson DeChambeau","Ludvig Åberg","Tommy Fleetwood","Jon Rahm"]},
    {name:"Andrés Ortiz",picks:["Scottie Scheffler","Jon Rahm","Rory McIlroy","Xander Schauffele","Bryson DeChambeau"]},
    {name:"Paul Franco",picks:["Scottie Scheffler","Rory McIlroy","Tommy Fleetwood","Bryson DeChambeau","Nicolás Echavarría"]},
    {name:"Felipe Bernal",picks:["Rory McIlroy","Ludvig Åberg","Brooks Koepka","Viktor Hovland","Xander Schauffele"]},
    {name:"German Ramos",picks:["Scottie Scheffler","Rory McIlroy","Jon Rahm","Ludvig Åberg","Xander Schauffele"]},
    {name:"Fernando Fierro",picks:["Scottie Scheffler","Bryson DeChambeau","Jon Rahm","Rory McIlroy","Ludvig Åberg"]},
    {name:"Mauricio Castillo",picks:["Rory McIlroy","Scottie Scheffler","Ludvig Åberg","Robert MacIntyre","Matt Fitzpatrick"]},
    {name:"Hugo Castañeda",picks:["Rory McIlroy","Scottie Scheffler","Nicolás Echavarría","Xander Schauffele","Collin Morikawa"]},
    {name:"Edwin González",picks:["Scottie Scheffler","Jon Rahm","Bryson DeChambeau","Rory McIlroy","Xander Schauffele"]},
    {name:"Jesús Rojas",picks:["Scottie Scheffler","Jon Rahm","Ludvig Åberg","Rory McIlroy","Xander Schauffele"]},
    {name:"Diego Niño",picks:["Scottie Scheffler","Jon Rahm","Collin Morikawa","Rory McIlroy","Ludvig Åberg"]}
  ]
};

const $=id=>document.getElementById(id);
const fmt=v=>v==null?"—":(v===0?"E":(v>0?`+${v}`:v));
const sum=a=>a.reduce((s,v)=>v==null?s:s+v,0);

function render(){
  $("chipStatus").textContent=`📅 ${data.dateLabel} · ${data.status}`;
  const pot=data.bettors.length*data.stakeCOP;
  $("chipPot").textContent=`💰 Pozo: $${pot.toLocaleString("es-CO")}`;

  const totals=data.bettors.map(b=>{
    const t=sum(b.picks.map(p=>data.leaderboard[p]));
    return{...b,total:t};
  }).sort((a,b)=>a.total-b.total);

  $("ranking").innerHTML="";
  $("cards").innerHTML="";

  totals.forEach((t,i)=>{
    const row=document.createElement("div");
    row.className="rank-row";
    row.innerHTML=`<span>${i+1}. ${t.name}</span><strong>${fmt(t.total)}</strong>`;
    row.onclick=()=>openModal(t);
    $("ranking").appendChild(row);

    const card=document.createElement("div");
    card.className="card";
    card.innerHTML=`
      <div class="card-head"><strong>${t.name}</strong><strong>${fmt(t.total)}</strong></div>
      <div class="players">
        ${t.picks.map(p=>`<div class="player"><span>${p}</span><span>${fmt(data.leaderboard[p])}</span></div>`).join("")}
      </div>`;
    $("cards").appendChild(card);
  });
}

function openModal(t){
  $("modalContent").innerHTML=`<h3>${t.name}</h3>
  ${t.picks.map(p=>`<div class="player"><strong>${p}</strong><span>${fmt(data.leaderboard[p])}</span></div>`).join("")}`;
  $("modal").classList.add("show");
}
function closeModal(){$("modal").classList.remove("show");}

function copyWhatsApp(){
  let text=`🐊 POLLA MASTERS AUGUSTA 2026\n💰 Pozo: $${(data.bettors.length*data.stakeCOP).toLocaleString("es-CO")}\n\n`;
  data.bettors.forEach(b=>{
    const t=sum(b.picks.map(p=>data.leaderboard[p]));
    text+=`${b.name}: ${fmt(t)}\n`;
  });
  navigator.clipboard.writeText(text);
}

render();
</script>

</body>
</html>
