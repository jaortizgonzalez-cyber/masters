<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#0b6e4f" />
  <title>🐊 Polla Masters Augusta 2026</title>

  <style>
    :root{
      --bg0:#03110a; --bg1:#07150e; --card:#0f1b15; --card2:#111f18;
      --glass: rgba(255,255,255,.06); --ring: rgba(255,255,255,.14);
      --text:#e6f0eb; --muted:#9fb8ad; --green:#0b6e4f; --green2:#0f8a63;
      --lime:#22c55e; --gold:#f4c430; --success:#22c55e; --shadow: rgba(0,0,0,.55);
      --radius2: 22px; --sans: system-ui, -apple-system, sans-serif;
      --mono: ui-monospace, monospace;
    }

    /* ====== ANIMACIONES WOW ====== */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes gatorFloat {
      0%, 100% { transform: translateY(0) rotate(10deg); }
      50% { transform: translateY(-20px) rotate(15deg); }
    }

    .fade-in { animation: fadeInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) both; }

    /* CHOMP ANIMATION */
    .chomp-overlay {
      position: fixed; inset: 0; z-index: 10000; pointer-events: none;
      display: flex; align-items: center; justify-content: center;
      background: radial-gradient(circle, rgba(11,110,79,0.4) 0%, transparent 70%);
      opacity: 0; transition: opacity 0.4s;
    }
    .chomp-overlay.active { opacity: 1; }
    .chomp-msg {
      font-size: clamp(3rem, 10vw, 6rem); font-weight: 1000; color: var(--gold);
      text-shadow: 0 0 30px rgba(244,196,48,0.6), 4px 4px 0px var(--bg0);
      transform: scale(0); transition: transform 0.5s cubic-bezier(0.17, 0.89, 0.32, 1.49);
    }
    .chomp-overlay.active .chomp-msg { transform: scale(1); }

    /* ====== BASE ====== */
    * { box-sizing: border-box; }
    body {
      margin: 0; color: var(--text); font-family: var(--sans);
      background: var(--bg0); overflow-x: hidden;
    }

    .glow-bg {
      position: fixed; inset: -200px; z-index: 0; pointer-events: none;
      background: radial-gradient(520px 260px at 20% 10%, rgba(34,197,94,.15), transparent 60%),
                  radial-gradient(420px 220px at 80% 80%, rgba(244,196,48,.1), transparent 60%);
      filter: blur(40px);
    }

    .gator-watermark {
      position: fixed; right: -50px; bottom: 50px; opacity: 0.08;
      width: 400px; z-index: 0; pointer-events: none; animation: gatorFloat 6s ease-in-out infinite;
    }

    header, .container { position: relative; z-index: 2; max-width: 1100px; margin: 0 auto; padding: 20px 18px; }

    /* ====== COMPONENTES ====== */
    .hero {
      border-radius: var(--radius2); border: 1px solid var(--ring);
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
      padding: 30px; box-shadow: 0 20px 60px var(--shadow); backdrop-filter: blur(12px);
    }

    .badge {
      display: inline-flex; align-items:center; gap:8px; padding: 8px 16px; border-radius: 999px;
      background: linear-gradient(135deg, var(--green), var(--green2));
      font-size: 12px; font-weight: 950; letter-spacing: 1px;
    }

    .leaderboard {
      margin: 25px 0; position: sticky; top: 12px; z-index: 10;
      border-radius: var(--radius2); border: 1px solid rgba(255,255,255,0.15);
      background: linear-gradient(135deg, rgba(11,110,79,0.95), rgba(15,138,99,0.9));
      padding: 18px; backdrop-filter: blur(15px); box-shadow: 0 25px 50px var(--shadow);
    }

    .rank-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 18px; border-radius: 16px; background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.1); margin-bottom: 10px; cursor: pointer;
      transition: all 0.2s ease;
    }
    .rank-row:hover { transform: translateX(5px); background: rgba(255,255,255,0.05); }
    .rank-row.leader { border-color: var(--gold); box-shadow: 0 0 20px rgba(244,196,48,0.25); }

    .grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 30px; }
    @media(min-width: 800px) { .grid { grid-template-columns: 1fr 1fr; } }

    .card {
      background: linear-gradient(180deg, var(--card), var(--card2));
      border: 1px solid var(--glass); border-radius: var(--radius2);
      padding: 20px; transition: transform 0.3s ease;
    }
    .card:hover { transform: translateY(-5px); border-color: var(--ring); }

    .avatar {
      width: 46px; height: 46px; border-radius: 14px;
      background: linear-gradient(135deg, var(--green), var(--green2));
      display: flex; align-items: center; justify-content: center; font-weight: 1000;
    }

    .pick-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,.05); font-size: 14px;
    }

    .btn {
      appearance: none; border: none; cursor: pointer; padding: 12px 20px;
      border-radius: 14px; font-weight: 950; color: white;
      background: linear-gradient(135deg, var(--green), var(--green2));
      box-shadow: 0 10px 20px rgba(0,0,0,0.3); transition: 0.2s;
    }
    .btn:active { transform: scale(0.95); }

    .modal {
      position: fixed; inset: 0; display: none; align-items: center; 
      justify-content: center; z-index: 1000; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
    }
    .modal.show { display: flex; animation: fadeIn 0.3s ease; }
    .sheet { 
      width: min(500px, 90%); background: var(--bg1); border-radius: 28px; 
      border: 1px solid var(--gold); padding: 30px; position: relative;
    }
  </style>
</head>

<body>
  <div class="glow-bg"></div>
  <img src="https://www.masters.com/en_US/images/players/2024/200x200/gator.png" class="gator-watermark" onerror="this.style.display='none'">
  
  <div class="chomp-overlay" id="chompOverlay">
    <div class="chomp-msg" id="chompMsg">🐊 CHOMP!</div>
  </div>

  <header class="fade-in" style="animation-delay: 0.1s;">
    <div class="hero">
      <div class="badge">🏌️ MASTERS AUGUSTA 2026</div>
      <h1 style="margin: 15px 0 5px; font-size: 32px;">Polla de Ganancias 🐊</h1>
      <p id="potBig" style="color:var(--gold); font-weight:900; font-size:20px; margin:0;">💰 Pozo: Cargando...</p>
      <div style="margin-top:20px; display:flex; gap:12px;">
        <button class="btn" onclick="copyWhatsApp()">📋 Compartir Ranking</button>
      </div>
    </div>
  </header>

  <div class="container fade-in" style="animation-delay: 0.3s;">
    <div class="leaderboard">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
         <h2 style="margin:0; font-size:18px;">🏆 Clasificación General</h2>
         <span style="font-size:11px; opacity:0.7;">TOCA PARA VER DETALLE</span>
      </div>
      <div id="ranking"></div>
    </div>

    <div class="grid" id="cards"></div>
  </div>

  <div class="modal" id="modal" onclick="closeModal()">
    <div class="sheet" onclick="event.stopPropagation()">
      <div id="mBody"></div>
      <button class="btn" style="width:100%; margin-top:25px;" onclick="closeModal()">Cerrar</button>
    </div>
  </div>

  <script>
    const data = {
      leaderboard: {}, 
      bettors: [
        { name:"Ronnie Sanchez",  picks:["Scottie Scheffler","Jon Rahm","Xander Schauffele","Cameron Young","Hideki Matsuyama"]},
        { name:"Juan Ardila",     picks:["Scottie Scheffler","Bryson DeChambeau","Ludvig Åberg","Tommy Fleetwood","Jon Rahm"]},
        { name:"Andrés Ortiz",    picks:["Scottie Scheffler","Jon Rahm","Rory McIlroy","Xander Schauffele","Bryson DeChambeau"]},
        { name:"Paul Franco",     picks:["Scottie Scheffler","Rory McIlroy","Tommy Fleetwood","Bryson DeChambeau","Nicolás Echavarría"]},
        { name:"Felipe Bernal",   picks:["Rory McIlroy","Ludvig Åberg","Brooks Koepka","Viktor Hovland","Xander Schauffele"]},
        { name:"German Ramos",    picks:["Scottie Scheffler","Rory McIlroy","Jon Rahm","Ludvig Åberg","Xander Schauffele"]},
        { name:"Fernando Fierro", picks:["Scottie Scheffler","Bryson DeChambeau","Jon Rahm","Rory McIlroy","Ludvig Åberg"]},
        { name:"Mauricio Castillo", picks:["Rory McIlroy","Scottie Scheffler","Ludvig Åberg","Robert MacIntyre","Matt Fitzpatrick"]},
        { name:"Hugo Castañeda",  picks:["Rory McIlroy","Scottie Scheffler","Nicolás Echavarría","Xander Schauffele","Collin Morikawa"]},
        { name:"Edwin González",  picks:["Scottie Scheffler","Jon Rahm","Bryson DeChambeau","Rory McIlroy","Xander Schauffele"]},
        { name:"Jesús Rojas",     picks:["Scottie Scheffler","Jon Rahm","Ludvig Åberg","Rory McIlroy","Xander Schauffele"]},
        { name:"Diego Niño",      picks:["Scottie Scheffler","Jon Rahm","Collin Morikawa","Rory McIlroy","Ludvig Åberg"]}
      ]
    };

    const parseMoney = s => s ? Number(s.replace(/[^0-9.-]+/g,"")) : 0;
    const fmtUSD = n => new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(n);
    const fmtCOP = n => new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',maximumFractionDigits:0}).format(n);

    function computeRanked(){
      return data.bettors.map(b => {
        const total = b.picks.reduce((acc, p) => acc + parseMoney(data.leaderboard[p]), 0);
        return { ...b, total };
      }).sort((a,b) => b.total - a.total);
    }

    function render(){
      const ranked = computeRanked();
      document.getElementById("potBig").textContent = `💰 Pozo Polla: ${fmtCOP(data.bettors.length * 50000)}`;

      document.getElementById("ranking").innerHTML = ranked.map((t,i) => `
        <div class="rank-row ${i===0?'leader':''}" onclick="openModalByIndex(${i})">
          <div style="display:flex; align-items:center;">
             <span style="font-weight:900; font-family:var(--mono); width:25px; color:${i===0?'var(--gold)':'inherit'}">${i+1}</span>
             <span style="font-weight:1000; margin-left:10px;">${t.name}</span>
          </div>
          <span style="color:var(--gold); font-weight:1000; font-family:var(--mono);">${fmtUSD(t.total)}</span>
        </div>
      `).join("");

      document.getElementById("cards").innerHTML = ranked.map((t, index) => `
        <div class="card fade-in" style="animation-delay: ${0.2 + (index*0.05)}s">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <div style="display:flex; gap:12px; align-items:center;">
              <div class="avatar">${t.name.split(" ").map(n=>n[0]).join("")}</div>
              <span style="font-weight:1000;">${t.name}</span>
            </div>
            <div style="text-align:right">
               <div style="font-size:10px; opacity:0.6;">GANANCIA</div>
               <div style="color:var(--gold); font-weight:1000; font-family:var(--mono);">${fmtUSD(t.total)}</div>
            </div>
          </div>
          ${t.picks.map(p => `
            <div class="pick-row">
              <span style="color:var(--muted)">${p}</span>
              <span style="font-weight:900; color:${parseMoney(data.leaderboard[p]) > 0 ? 'var(--success)' : 'white'}">
                ${data.leaderboard[p] || "$0"}
              </span>
            </div>
          `).join("")}
        </div>
      `).join("");
    }

    function triggerChomp(name) {
      const overlay = document.getElementById("chompOverlay");
      document.getElementById("chompMsg").innerHTML = `🐊 CHOMP!<br><small style="font-size:0.4em; color:white;">LÍDER:</small><br>${name.toUpperCase()}`;
      overlay.classList.add("active");
      
      for(let i=0; i<60; i++) {
        const c = document.createElement("div");
        c.style.cssText = `position:fixed; width:8px; height:8px; background:var(--gold); top:-10px; left:${Math.random()*100}vw; opacity:0; z-index:10001; animation: fall 3s ${Math.random()*2}s linear forwards;`;
        if(i%2===0) c.style.background = "var(--green2)";
        document.body.appendChild(c);
        setTimeout(()=>c.remove(), 5000);
      }
      setTimeout(() => overlay.classList.remove("active"), 2800);
    }

    // Inyectar estilo de caída para confeti
    const style = document.createElement('style');
    style.innerHTML = `@keyframes fall { 0% { transform: translateY(0) rotate(0); opacity:1; } 100% { transform: translateY(110vh) rotate(720deg); opacity:0; } }`;
    document.head.appendChild(style);

    function openModalByIndex(idx){
      const ranked = computeRanked();
      const t = ranked[idx];
      if(idx === 0) triggerChomp(t.name);

      document.getElementById("mBody").innerHTML = `
        <div style="text-align:center; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:15px; margin-bottom:15px;">
           <h2 style="color:var(--gold); margin:0;">${t.name}</h2>
           <p style="font-size:24px; font-weight:1000; margin:5px 0;">${fmtUSD(t.total)}</p>
        </div>
        ${t.picks.map(p => `
          <div class="pick-row">
            <span>${p}</span>
            <span style="font-weight:900; color:var(--success)">${data.leaderboard[p] || "$0"}</span>
          </div>
        `).join("")}
      `;
      document.getElementById("modal").classList.add("show");
    }

    function closeModal(){ document.getElementById("modal").classList.remove("show"); }

    fetch("./leaderboard.json?ts="+Date.now())
      .then(r => r.json())
      .then(j => { data.leaderboard = j; render(); })
      .catch(() => render());

    function copyWhatsApp(){
      const ranked = computeRanked();
      let txt = `🐊 POLLA MASTERS 2026 🏌️‍♂️\n`;
      txt += `--------------------------\n`;
      ranked.forEach((t,i)=> txt += `${i+1}. ${t.name}: ${fmtUSD(t.total)}\n`);
      navigator.clipboard.writeText(txt).then(() => {
         alert("Ranking copiado al portapapeles ✅");
      });
    }
  </script>
</body>
</html>
