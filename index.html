<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#0b6e4f" />
  <title>🐊 Polla Masters Augusta 2026</title>

  <style>
    :root{
      --bg0:#03110a; --bg1:#07150e; --card:#0f1b15; --card2:#111f18;
      --text:#e6f0eb; --muted:#9fb8ad; --green:#0b6e4f; --green2:#0f8a63;
      --gold:#f4c430; --success:#22c55e; --shadow: rgba(0,0,0,.55);
      --radius2: 22px; --sans: system-ui, -apple-system, sans-serif;
      --mono: ui-monospace, monospace;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0; color: var(--text); font-family: var(--sans);
      background: linear-gradient(180deg, var(--bg0), var(--bg1) 55%, var(--bg0));
      overflow-x: hidden;
    }

    header, .container { max-width: 1100px; margin: 0 auto; padding: 20px 18px; }

    .hero {
      border-radius: var(--radius2); border: 1px solid rgba(255,255,255,.1);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      padding: 20px; box-shadow: 0 18px 60px var(--shadow); backdrop-filter: blur(8px);
    }

    .badge {
      display: inline-flex; padding: 7px 12px; border-radius: 999px;
      background: linear-gradient(135deg, var(--green), var(--green2));
      font-size: 12px; font-weight: 950; margin-bottom: 10px;
    }

    .hero-box {
      background: rgba(0,0,0,.18); border-radius: 16px; padding: 12px;
      border: 1px solid rgba(255,255,255,.1); margin-top: 15px;
    }

    .leaderboard {
      margin: 20px 0; position: sticky; top: 12px; z-index: 10;
      border-radius: var(--radius2); border: 1px solid rgba(255,255,255,.12);
      background: linear-gradient(135deg, rgba(11,110,79,.98), rgba(15,138,99,.94));
      padding: 15px; backdrop-filter: blur(8px); box-shadow: 0 20px 50px var(--shadow);
    }

    .rank-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px; border-radius: 14px; background: rgba(0,0,0,.22);
      border: 1px solid rgba(255,255,255,.12); margin-bottom: 8px; cursor: pointer;
    }

    .grid { display: grid; grid-template-columns: 1fr; gap: 16px; margin-top: 20px; }
    @media(min-width: 768px) { .grid { grid-template-columns: 1fr 1fr; } }

    /* ESTILO DE LA CARD RECONSTRUIDO */
    .card {
      background: linear-gradient(180deg, var(--card), var(--card2));
      border: 1px solid rgba(255,255,255,.1); border-radius: var(--radius2);
      padding: 18px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .card-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 10px;
    }

    .avatar {
      width: 42px; height: 42px; border-radius: 50%;
      background: linear-gradient(135deg, var(--green), var(--green2));
      display: flex; align-items: center; justify-content: center;
      font-weight: 1000; font-size: 14px;
    }

    .who-info { display: flex; flex-direction: column; gap: 2px; }

    .pick-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,.03);
      font-size: 14px;
    }

    .pick-name { color: var(--muted); font-weight: 500; }
    .pick-earning { font-family: var(--mono); font-weight: 900; }

    .btn {
      appearance: none; border: none; cursor: pointer; padding: 10px 15px;
      border-radius: 12px; font-weight: 950; color: white;
      background: var(--green); border: 1px solid rgba(255,255,255,0.2);
    }

    .toast {
      position: fixed; left: 50%; bottom: 20px; transform: translateX(-50%);
      background: var(--bg1); border: 1px solid var(--gold);
      padding: 10px 20px; border-radius: 10px; display: none; z-index: 10000;
    }
  </style>
</head>

<body>
  <header>
    <div class="hero">
      <div class="badge">🏌️ MASTERS AUGUSTA 2026</div>
      <h1>Polla: Ranking de Ganancias</h1>
      <div class="hero-box">
        <span style="font-size:12px; font-weight:800;">💰 POZO TOTAL:</span>
        <span id="potBig" style="font-size:20px; font-weight:1000; color:var(--gold); margin-left:10px;">—</span>
      </div>
      <div style="margin-top:15px; display:flex; gap:10px;">
        <button class="btn" onclick="copyWhatsApp()">📋 WhatsApp</button>
        <button class="btn" onclick="window.scrollTo({top: 800, behavior:'smooth'})">👇 Ver Detalle</button>
      </div>
    </div>
  </header>

  <div class="container">
    <div class="leaderboard">
      <h2 style="margin:0 0 10px; font-size:18px;">🏆 Tabla de Posiciones</h2>
      <div id="ranking"></div>
    </div>

    <h2 style="margin:40px 0 20px;">👤 Detalle por Apostador</h2>
    <div class="grid" id="cards"></div>
  </div>

  <div id="toast" class="toast">Copiado ✅</div>

  <script>
    const data = {
      stakeCOP: 50000,
      leaderboard: {}, 
      bettors: [
        { name:"Ronnie Sanchez",  picks:["Scottie Scheffler","Jon Rahm","Xander Schauffele","Cameron Young","Hideki Matsuyama"]},
        { name:"Juan Ardila",     picks:["Scottie Scheffler","Bryson DeChambeau","Ludvig Åberg","Tommy Fleetwood","Jon Rahm"]},
        { name:"Andrés Ortiz",    picks:["Scottie Scheffler","Jon Rahm","Rory McIlroy","Xander Schauffele","Bryson DeChambeau"]},
        { name:"Paul Franco",     picks:["Scottie Scheffler","Rory McIlroy","Tommy Fleetwood","Bryson DeChambeau","Nicolás Echavarría"]},
        { name:"Felipe Bernal",   picks:["Rory McIlroy","Ludvig Åberg","Brooks Koepka","Viktor Hovland","Xander Schauffele"]},
        { name:"German Ramos",    picks:["Scottie Scheffler","Rory McIlroy","Jon Rahm","Ludvig Åberg","Xander Schauffele"]},
        { name:"Fernando Fierro", picks:["Scottie Scheffler","Bryson DeChambeau","Jon Rahm","Rory McIlroy","Ludvig Åberg"]},
        { name:"Mauricio Castillo", picks:["Rory McIlroy","Scottie Scheffler","Ludvig Åberg","Robert MacIntyre","Matt Fitzpatrick"]},
        { name:"Hugo Castañeda",  picks:["Rory McIlroy","Scottie Scheffler","Nicolás Echavarría","Xander Schauffele","Collin Morikawa"]},
        { name:"Edwin González",  picks:["Scottie Scheffler","Jon Rahm","Bryson DeChambeau","Rory McIlroy","Xander Schauffele"]},
        { name:"Jesús Rojas",     picks:["Scottie Scheffler","Jon Rahm","Ludvig Åberg","Rory McIlroy","Xander Schauffele"]},
        { name:"Diego Niño",      picks:["Scottie Scheffler","Jon Rahm","Collin Morikawa","Rory McIlroy","Ludvig Åberg"]}
      ]
    };

    const parseMoney = s => s ? Number(s.replace(/[^0-9.-]+/g,"")) : 0;
    const fmtUSD = n => new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(n);
    const fmtCOP = n => new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',maximumFractionDigits:0}).format(n);

    function computeRanked(){
      return data.bettors.map(b => {
        const total = b.picks.reduce((acc, p) => acc + parseMoney(data.leaderboard[p]), 0);
        return { ...b, total };
      }).sort((a,b) => b.total - a.total);
    }

    function render(){
      const ranked = computeRanked();
      document.getElementById("potBig").textContent = fmtCOP(data.bettors.length * data.stakeCOP);

      // Render Ranking
      document.getElementById("ranking").innerHTML = ranked.map((t,i) => `
        <div class="rank-row">
          <span style="font-weight:900; width:30px;">${i+1}</span>
          <span style="flex-grow:1; font-weight:1000;">${t.name}</span>
          <span style="color:var(--gold); font-weight:1000; font-family:var(--mono);">${fmtUSD(t.total)}</span>
        </div>
      `).join("");

      // Render Cards (DETALLE CLARO POR JUGADOR)
      document.getElementById("cards").innerHTML = ranked.map(t => `
        <div class="card">
          <div class="card-header">
            <div style="display:flex; gap:12px; align-items:center;">
              <div class="avatar">${t.name.split(" ").map(n=>n[0]).join("")}</div>
              <div class="who-info">
                <span style="font-weight:1000; font-size:16px;">${t.name}</span>
                <span style="font-size:11px; color:var(--muted); text-transform:uppercase;">Picks del Torneo</span>
              </div>
            </div>
            <div style="text-align:right;">
              <div style="font-size:10px; color:var(--muted);">TOTAL ACUMULADO</div>
              <div style="color:var(--gold); font-weight:1000; font-size:18px; font-family:var(--mono);">${fmtUSD(t.total)}</div>
            </div>
          </div>
          
          <div class="picks-list">
            ${t.picks.map(p => {
              const val = data.leaderboard[p] || "$0";
              const numVal = parseMoney(val);
              return `
                <div class="pick-row">
                  <span class="pick-name">${p}</span>
                  <span class="pick-earning" style="color:${numVal > 0 ? 'var(--success)' : 'var(--text)'}">
                    ${val}
                  </span>
                </div>
              `;
            }).join("")}
          </div>
        </div>
      `).join("");
    }

    // Cargar datos del servidor
    fetch("./leaderboard.json?ts="+Date.now())
      .then(r => r.json())
      .then(j => { data.leaderboard = j; render(); })
      .catch(() => render());

    function copyWhatsApp(){
      const ranked = computeRanked();
      let txt = `🐊 POLLA MASTERS 2026 - DINERO\n\n`;
      ranked.forEach((t,i)=> txt += `${i+1}. ${t.name}: ${fmtUSD(t.total)}\n`);
      navigator.clipboard.writeText(txt).then(()=>{
        const t = document.getElementById("toast");
        t.style.display="block"; setTimeout(()=>t.style.display="none", 2000);
      });
    }
  </script>
</body>
</html>
