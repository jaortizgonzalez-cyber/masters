<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#0b6e4f" />
  <title>🐊 Polla Masters Augusta 2026</title>

  <style>
    :root{
      --bg0:#03110a;
      --bg1:#07150e;
      --card:#0f1b15;
      --card2:#111f18;
      --glass: rgba(255,255,255,.06);
      --ring: rgba(255,255,255,.14);
      --text:#e6f0eb;
      --muted:#9fb8ad;

      --green:#0b6e4f;
      --green2:#0f8a63;
      --lime:#22c55e;

      --gold:#f4c430;
      --silver:#cbd5e1;
      --bronze:#fb7185;

      --danger:#ef4444;
      --success:#22c55e;

      --shadow: rgba(0,0,0,.55);
      --shadow2: rgba(0,0,0,.35);

      --stickyTop: 12px;
      --max: 1100px;

      --radius: 18px;
      --radius2: 22px;

      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Courier New", monospace;
      --sans: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    /* ====== AJUSTE: BÓVEDA DE AUDIO INVISIBLE ====== */
    .audio-vault {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
      pointer-events: none;
    }

    /* ====== ANIMACIÓN CHOMP LEADER ====== */
    .chomp-overlay {
      position: fixed;
      inset: 0;
      z-index: 10000;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: radial-gradient(circle, rgba(11,110,79,0.2) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    .chomp-overlay.active { opacity: 1; }

    .chomp-msg {
      font-size: clamp(3rem, 10vw, 6rem);
      font-weight: 1000;
      color: var(--gold);
      text-shadow: 0 0 30px rgba(244,196,48,0.6), 4px 4px 0px var(--bg0);
      transform: scale(0.5);
      animation: chompBlast 0.8s cubic-bezier(0.17, 0.89, 0.32, 1.49) forwards;
      text-align: center;
      line-height: 1;
    }
    
    @keyframes chompBlast {
      to { transform: scale(1); }
    }

    .confetti-piece {
      position: absolute;
      width: 12px;
      height: 12px;
      background: var(--gold);
      top: -20px;
      opacity: 0;
      animation: confettiFall 3s linear forwards;
    }

    @keyframes confettiFall {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      color:var(--text);
      font-family:var(--sans);
      overflow-x:hidden;
      background:
        radial-gradient(1200px 520px at 18% 0%, rgba(15,138,99,.26), transparent 60%),
        radial-gradient(900px 520px at 92% 15%, rgba(11,110,79,.22), transparent 55%),
        linear-gradient(180deg,var(--bg0), var(--bg1) 55%, var(--bg0));
    }

    /* ====== WOW BACKDROP FX ====== */
    .glow{
      position:fixed;
      inset:-200px;
      z-index:0;
      pointer-events:none;
      background:
        radial-gradient(520px 260px at 20% 10%, rgba(34,197,94,.12), transparent 60%),
        radial-gradient(520px 260px at 80% 20%, rgba(11,110,79,.16), transparent 60%),
        radial-gradient(420px 220px at 60% 80%, rgba(244,196,48,.08), transparent 60%);
      filter: blur(6px);
      opacity:.9;
    }

    .gator-watermark{
      position:fixed;
      right:-90px;
      top:120px;
      opacity:.10;
      transform: rotate(10deg);
      z-index:0;
      pointer-events:none;
      filter: drop-shadow(0 18px 30px rgba(0,0,0,.45));
    }

    header{
      position:relative;
      z-index:2;
      max-width:var(--max);
      margin:0 auto;
      padding:26px 18px 12px;
    }
    .container{
      position:relative;
      z-index:2;
      max-width:var(--max);
      margin:0 auto;
      padding:10px 18px 28px;
    }

    .hero{
      border-radius:var(--radius2);
      border:1px solid rgba(255,255,255,.10);
      background:
        radial-gradient(800px 240px at 15% 0%, rgba(15,138,99,.28), transparent 60%),
        radial-gradient(800px 240px at 85% 20%, rgba(11,110,79,.22), transparent 60%),
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      box-shadow: 0 18px 60px var(--shadow);
      padding:16px 16px 14px;
      backdrop-filter: blur(8px);
    }

    .topline{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:7px 12px;
      border-radius:999px;
      background:linear-gradient(135deg,var(--green),var(--green2));
      border:1px solid rgba(255,255,255,.12);
      box-shadow:0 10px 26px rgba(0,0,0,.25);
      font-size:12px;
      font-weight:950;
      letter-spacing:.35px;
      user-select:none;
      white-space:nowrap;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .gator-mini{
      width:54px;
      height:54px;
      flex:0 0 auto;
      filter: drop-shadow(0 12px 20px rgba(0,0,0,.45));
      animation:gatorFloat 3.3s ease-in-out infinite;
    }
    @keyframes gatorFloat{
      0%,100%{ transform: translateY(0); }
      50%{ transform: translateY(-3px); }
    }

    .titles{
      min-width:0;
    }
    h1{
      margin:10px 0 6px;
      font-size:28px;
      font-weight:1000;
      letter-spacing:.2px;
      line-height:1.1;
    }
    .sub{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      color:var(--muted);
      font-size:13px;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:5px 10px;
      border-radius:999px;
      background:rgba(0,0,0,.18);
      border:1px solid rgba(255,255,255,.10);
      color:rgba(230,240,235,.95);
      font-size:12px;
      font-weight:850;
      white-space:nowrap;
      user-select:none;
    }

    .hero-row{
      margin-top:12px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:stretch;
    }
    .hero-box{
      flex:1 1 230px;
      min-width:210px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(0,0,0,.18);
      padding:12px;
      box-shadow: 0 14px 34px rgba(0,0,0,.22);
    }
    .hero-box .k{
      font-size:12px;
      color:rgba(255,255,255,.85);
      font-weight:900;
    }
    .hero-box .v{
      margin-top:6px;
      display:flex;
      justify-content:space-between;
      align-items:baseline;
      gap:10px;
    }
    .hero-box .big{
      font-size:18px;
      font-weight:1000;
    }

    .cta{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:flex-end;
    }
    .btn{
      appearance:none;
      border:none;
      cursor:pointer;
      padding:10px 12px;
      border-radius:14px;
      font-weight:950;
      color:white;
      background:rgba(0,0,0,.20);
      border:1px solid rgba(255,255,255,.14);
      box-shadow: 0 12px 28px rgba(0,0,0,.28);
      transition: transform .12s ease;
      user-select:none;
      display:inline-flex;
      align-items:center;
      gap:8px;
    }
    .btn.primary{
      background:linear-gradient(135deg,var(--green),var(--green2));
    }

    .leaderboard{
      margin-top:16px;
      position:sticky;
      top:var(--stickyTop);
      z-index:10;
      border-radius:var(--radius2);
      border:1px solid rgba(255,255,255,.12);
      background:linear-gradient(135deg, rgba(11,110,79,.98), rgba(15,138,99,.94));
      box-shadow: 0 18px 56px var(--shadow);
      padding:14px 14px 12px;
      backdrop-filter: blur(8px);
    }

    .rank{ display:flex; flex-direction:column; gap:8px; }
    .rank-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      padding:10px 12px;
      border-radius:14px;
      background:rgba(0,0,0,.22);
      border:1px solid rgba(255,255,255,.12);
      cursor:pointer;
      user-select:none;
      position:relative;
      overflow:hidden;
    }
    .rank-row.leader{ border-color: var(--gold); }
    .pos{ width:34px; font-weight:1000; font-family:var(--mono); }
    .nm{ font-weight:1000; flex-grow: 1; }
    .sc{ font-weight:1000; font-family:var(--mono); }

    .grid{
      margin-top:16px;
      display:grid;
      grid-template-columns:1fr;
      gap:14px;
    }
    @media(min-width:900px){ .grid{ grid-template-columns:1fr 1fr; } }

    .card{
      background:linear-gradient(180deg, rgba(15,27,21,.92), rgba(17,31,24,.86));
      border:1px solid rgba(255,255,255,.10);
      border-radius:var(--radius2);
      padding:14px;
      position:relative;
    }
    .avatar{
      width:40px; height:40px; border-radius:50%;
      background:linear-gradient(135deg,var(--green),var(--green2));
      display:flex; align-items:center; justify-content:center; font-weight:1000;
    }

    .modal{
      position:fixed; inset:0; display:none; align-items:flex-end; justify-content:center;
      z-index:1000; background:rgba(0,0,0,.62);
    }
    .modal.show{ display:flex; }
    .sheet{
      width:min(780px, 100%);
      border-radius:24px 24px 18px 18px;
      background:linear-gradient(180deg, rgba(15,27,21,.98), rgba(11,18,14,.94));
      border:1px solid rgba(255,255,255,.14);
      padding:12px;
      animation: sheetIn .22s ease-out forwards;
    }
    @keyframes sheetIn{ to{ transform:translateY(0); opacity:1; } }

    .toast{
      position:fixed; left:50%; bottom:16px; transform:translateX(-50%);
      z-index:9999; padding:10px 12px; border-radius:14px;
      background:rgba(15,27,21,.96); border:1px solid var(--gold);
      display:none; font-weight:950;
    }
    .good{ color:var(--success); } .bad{ color:var(--danger); }
  </style>
</head>

<body>
  <div class="glow"></div>
  
  <div class="audio-vault">
    <iframe id="mastersAudio" src="https://archive.org/embed/tvtunes_7756&autoplay=1" width="100" height="100" frameborder="0" allow="autoplay"></iframe>
  </div>

  <div class="chomp-overlay" id="chompOverlay">
    <div class="chomp-msg" id="chompMsg">🐊 CHOMP!</div>
  </div>

  <header>
    <div class="hero">
      <div class="topline">
        <div class="badge">🏌️ MASTERS AUGUSTA 2026 · POLLA</div>
        <div class="brand">
          <svg class="gator-mini" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <circle cx="100" cy="100" r="96" fill="#0b6e4f"/>
            <path d="M30 110 C50 70 120 40 165 65 C185 75 185 125 160 135 Z" fill="#22c55e"/>
          </svg>
        </div>
      </div>
      <div class="titles">
        <h1>Leaderboard de Apostadores</h1>
        <div class="sub">
          <span class="chip" id="chipStatus">📅 Actualizando...</span>
          <span class="chip" id="audioNote">🔈 Sonido: toca para activar ambiente</span>
        </div>
      </div>
      <div class="hero-row">
        <div class="hero-box"><div class="k">💰 POZO TOTAL</div><div class="v"><div class="big" id="potBig">—</div></div></div>
        <div class="hero-box">
          <div class="cta">
            <button class="btn primary" onclick="copyWhatsApp()">📋 WhatsApp</button>
            <button class="btn" onclick="scrollToCards()">👇 Ver cards</button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <div class="container">
    <div class="leaderboard">
      <h2 style="margin:0 0 10px; font-size:18px;">🏆 Ranking</h2>
      <div class="rank" id="ranking"></div>
    </div>
    <div class="grid" id="cards"></div>
  </div>

  <div class="modal" id="modal">
    <div class="sheet" id="sheet">
      <div id="mBody"></div>
      <button class="btn" style="width:100%; margin-top:10px;" onclick="closeModal()">Cerrar</button>
    </div>
  </div>

  <div class="toast" id="toast">Copiado ✅</div>

  <script>
    const data = {
      dateLabel: "Jueves · Ronda 1",
      status: "En juego",
      stakeCOP: 50000,
      leaderboard: {},
      bettors: [
        { name:"Ronnie Sanchez",  picks:["Scottie Scheffler","Jon Rahm","Xander Schauffele","Cameron Young","Hideki Matsuyama"]},
        { name:"Juan Ardila",     picks:["Scottie Scheffler","Bryson DeChambeau","Ludvig Åberg","Tommy Fleetwood","Jon Rahm"]},
        { name:"Andrés Ortiz",    picks:["Scottie Scheffler","Jon Rahm","Rory McIlroy","Xander Schauffele","Bryson DeChambeau"]},
        { name:"Paul Franco",     picks:["Scottie Scheffler","Rory McIlroy","Tommy Fleetwood","Bryson DeChambeau","Nicolás Echavarría"]},
        { name:"Felipe Bernal",   picks:["Rory McIlroy","Ludvig Åberg","Brooks Koepka","Viktor Hovland","Xander Schauffele"]},
        { name:"German Ramos",    picks:["Scottie Scheffler","Rory McIlroy","Jon Rahm","Ludvig Åberg","Xander Schauffele"]},
        { name:"Fernando Fierro", picks:["Scottie Scheffler","Bryson DeChambeau","Jon Rahm","Rory McIlroy","Ludvig Åberg"]},
        { name:"Mauricio Castillo", picks:["Rory McIlroy","Scottie Scheffler","Ludvig Åberg","Robert MacIntyre","Matt Fitzpatrick"]},
        { name:"Hugo Castañeda",  picks:["Rory McIlroy","Scottie Scheffler","Nicolás Echavarría","Xander Schauffele","Collin Morikawa"]},
        { name:"Edwin González",  picks:["Scottie Scheffler","Jon Rahm","Bryson DeChambeau","Rory McIlroy","Xander Schauffele"]},
        { name:"Jesús Rojas",     picks:["Scottie Scheffler","Jon Rahm","Ludvig Åberg","Rory McIlroy","Xander Schauffele"]},
        { name:"Diego Niño",      picks:["Scottie Scheffler","Jon Rahm","Collin Morikawa","Rory McIlroy","Ludvig Åberg"]}
      ]
    };

    // ====== LÓGICA DE AUDIO INVISIBLE ======
    function initAudio() {
      const frame = document.getElementById('mastersAudio');
      if(frame) frame.src = frame.src; // Fuerza el play tras la interacción
      const note = document.getElementById('audioNote');
      if(note) note.textContent = "🎵 Ambiente: Augusta ACTIVO";
      document.removeEventListener('click', initAudio);
      document.removeEventListener('scroll', initAudio);
    }
    document.addEventListener('click', initAudio);
    document.addEventListener('scroll', initAudio);

    const $ = (id)=>document.getElementById(id);
    const fmtScore = v => (v === 0 ? "E" : (v > 0 ? `+${v}` : v) || "—");
    const scoreClass = v => v < 0 ? "good" : (v > 0 ? "bad" : "");
    const fmtCOP = n => new Intl.NumberFormat('es-CO', { style:'currency', currency:'COP', maximumFractionDigits:0 }).format(n);
    const initials = n => n.split(" ").map(p=>p[0]).join("").toUpperCase();

    function computeRanked(){
      return data.bettors.map(b => {
        const scores = b.picks.map(p => data.leaderboard[p] ?? 0);
        const total = scores.reduce((a,b)=>a+b, 0);
        return { ...b, total };
      }).sort((a,b)=>a.total - b.total);
    }

    function render(){
      $("chipStatus").textContent = `📅 ${data.dateLabel} · ${data.status}`;
      $("potBig").textContent = fmtCOP(data.bettors.length * data.stakeCOP);
      
      const ranked = computeRanked();
      const rankDiv = $("ranking");
      rankDiv.innerHTML = ranked.map((t,i)=>`
        <div class="rank-row ${i===0?'leader':''}" onclick="openModalByIndex(${i})">
          <span class="pos">${i+1}</span>
          <span class="nm">${t.name}</span>
          <span class="sc ${scoreClass(t.total)}">${fmtScore(t.total)}</span>
        </div>
      `).join("");

      const cardsDiv = $("cards");
      cardsDiv.innerHTML = ranked.map(t=>`
        <div class="card">
          <div style="display:flex; gap:10px; align-items:center; margin-bottom:10px;">
            <div class="avatar">${initials(t.name)}</div>
            <span class="who-name">${t.name} (Total: ${fmtScore(t.total)})</span>
          </div>
          ${t.picks.map(p=>`
            <div style="display:flex; justify-content:space-between; font-size:13px; padding:4px 0; border-bottom:1px solid rgba(255,255,255,.05);">
              <span>${p}</span><span class="${scoreClass(data.leaderboard[p])}">${fmtScore(data.leaderboard[p])}</span>
            </div>
          `).join("")}
        </div>
      `).join("");
    }

    function openModalByIndex(idx){
      const t = computeRanked()[idx];
      $("mBody").innerHTML = `<h2 style="color:var(--gold);">${t.name}</h2><p>Total: ${fmtScore(t.total)}</p>`;
      $("modal").classList.add("show");
    }
    function closeModal(){ $("modal").classList.remove("show"); }

    fetch("./leaderboard.json?ts="+Date.now()).then(r=>r.json()).then(j=>{
      data.leaderboard = j; render();
    }).catch(()=>render());

    function copyWhatsApp(){
      const ranked = computeRanked();
      let txt = `🐊 POLLA MASTERS 2026\n`;
      ranked.forEach((t,i)=> txt += `${i+1}. ${t.name}: ${fmtScore(t.total)}\n`);
      navigator.clipboard.writeText(txt).then(()=>{$("toast").style.display="block"; setTimeout(()=>$("toast").style.display="none", 2000)});
    }
    function scrollToCards(){ $("cards").scrollIntoView({behavior:"smooth"}); }
  </script>
</body>
</html>
