<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Polla Masters Augusta 2026</title>

  <!-- GOOGLE FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#07150e;
      --green:#0b6e4f;
      --green-soft:#0f8a63;
      --card:#111c17;
      --text:#e6f0eb;
      --muted:#9fb8ad;
      --gold:#f4c430;
      --silver:#cbd5e1;
      --bronze:#fb7185;
      --danger:#ef4444;
      --success:#22c55e;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      background:linear-gradient(180deg,#04110b,#07150e 40%);
      font-family:'Inter',system-ui,-apple-system,BlinkMacSystemFont;
      color:var(--text);
    }

    header{
      padding:28px 20px 20px;
      max-width:1100px;
      margin:auto;
    }

    .badge{
      background:var(--green);
      padding:6px 12px;
      display:inline-block;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      letter-spacing:.3px;
    }

    h1{
      margin:14px 0 6px;
      font-size:28px;
      font-weight:800;
    }

    .subtitle{
      color:var(--muted);
      font-size:14px;
    }

    .container{
      max-width:1100px;
      margin:auto;
      padding:20px;
    }

    /* LEADERBOARD */
    .leaderboard{
      background:linear-gradient(135deg,#0b6e4f,#0f8a63);
      border-radius:18px;
      padding:20px;
      margin-bottom:28px;
      position:sticky;
      top:12px;
      z-index:10;
      box-shadow:0 15px 40px rgba(0,0,0,.35);
    }

    .leaderboard h2{
      margin:0 0 14px;
      font-size:18px;
      font-weight:800;
    }

    .rank-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:10px 12px;
      background:rgba(0,0,0,.25);
      border-radius:12px;
      margin-bottom:8px;
    }

    .rank-row span{
      font-weight:700;
    }

    .pos{
      width:28px;
    }

    .gold{color:var(--gold)}
    .silver{color:var(--silver)}
    .bronze{color:var(--bronze)}

    /* CARDS */
    .grid{
      display:grid;
      grid-template-columns:1fr;
      gap:18px;
    }

    @media(min-width:900px){
      .grid{grid-template-columns:1fr 1fr}
    }

    .card{
      background:var(--card);
      padding:18px;
      border-radius:18px;
      box-shadow:0 12px 30px rgba(0,0,0,.3);
      transition:transform .2s;
    }

    .card:hover{
      transform:translateY(-3px);
    }

    .card-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:12px;
    }

    .name{
      font-size:17px;
      font-weight:800;
    }

    .total{
      font-size:16px;
      font-weight:800;
    }

    .good{color:var(--success)}
    .bad{color:var(--danger)}

    .players{
      border-top:1px dashed rgba(255,255,255,.1);
      margin-top:12px;
      padding-top:12px;
    }

    .player{
      display:flex;
      justify-content:space-between;
      padding:6px 0;
      font-size:14px;
    }

    footer{
      text-align:center;
      padding:30px 20px;
      color:var(--muted);
      font-size:12px;
    }

    button{
      background:var(--green);
      border:none;
      color:white;
      padding:10px 16px;
      border-radius:12px;
      font-weight:700;
      cursor:pointer;
      margin-top:10px;
    }

    button:hover{opacity:.9}
  </style>
</head>

<body>

<header>
  <span class="badge">🏌️ MASTERS AUGUSTA 2026</span>
  <h1>Polla Oficial</h1>
  <div class="subtitle" id="subtitle">Esperando actualización…</div>
</header>

<div class="container">

  <!-- LEADERBOARD -->
  <div class="leaderboard">
    <h2>🏆 Leaderboard</h2>
    <div id="ranking"></div>
    <button onclick="copyWhatsApp()">📋 Copiar ranking para WhatsApp</button>
  </div>

  <!-- CARDS -->
  <div class="grid" id="cards"></div>
</div>

<footer>
  Gana el total más bajo · Update en vivo · Augusta vibes
</footer>

<script>
const data = {
  dateLabel: "Jueves · Ronda 1",
  status: "En juego",
  leaderboard: {
    "Scottie Scheffler": null,
    "Jon Rahm": null,
    "Rory McIlroy": null,
    "Xander Schauffele": null,
    "Cameron Young": null,
    "Hideki Matsuyama": null,
    "Bryson DeChambeau": null,
    "Ludvig Åberg": null,
    "Tommy Fleetwood": null,
    "Nicolás Echavarría": null,
    "Brooks Koepka": null,
    "Viktor Hovland": null
  },
  bettors: [
    { name:"Ronnie Sanchez", picks:["Scottie Scheffler","Jon Rahm","Xander Schauffele","Cameron Young","Hideki Matsuyama"]},
    { name:"Juan Ardila", picks:["Scottie Scheffler","Bryson DeChambeau","Ludvig Åberg","Tommy Fleetwood","Jon Rahm"]},
    { name:"Andrés Ortiz", picks:["Scottie Scheffler","Jon Rahm","Rory McIlroy","Xander Schauffele","Bryson DeChambeau"]},
    { name:"Paul Franco", picks:["Scottie Scheffler","Rory McIlroy","Tommy Fleetwood","Bryson DeChambeau","Nicolás Echavarría"]},
    { name:"Felipe Bernal", picks:["Rory McIlroy","Ludvig Åberg","Brooks Koepka","Viktor Hovland","Xander Schauffele"]},
    { name:"German Ramos", picks:["Scottie Scheffler","Rory McIlroy","Jon Rahm","Ludvig Åberg","Xander Schauffele"]},
    { name:"Fernando Fierro", picks:["Scottie Scheffler","Bryson DeChambeau","Jon Rahm","Rory McIlroy","Ludvig Åberg"]}
  ]
};

const fmt=v=>v==null?"—":(v===0?"E":v>0?`+${v}`:v);
const sum=a=>a.filter(v=>v!=null).reduce((s,v)=>s+v,0);
const $=id=>document.getElementById(id);

function render(){
  $("subtitle").textContent = `📅 ${data.dateLabel} · ${data.status}`;

  const totals = data.bettors.map(b=>{
    const scores = b.picks.map(p=>data.leaderboard[p]);
    return{...b,total:scores.some(v=>v!=null)?sum(scores):null,scores};
  }).sort((a,b)=>a.total-b.total);

  $("ranking").innerHTML="";
  totals.forEach((t,i)=>{
    $("ranking").innerHTML+=`
      <div class="rank-row">
        <span class="pos ${i==0?'gold':i==1?'silver':i==2?'bronze':''}">${i+1}</span>
        <span>${t.name}</span>
        <span class="${t.total<0?'good':t.total>0?'bad':''}">${fmt(t.total)}</span>
      </div>`;
  });

  $("cards").innerHTML="";
  totals.forEach(t=>{
    $("cards").innerHTML+=`
      <div class="card">
        <div class="card-head">
          <div class="name">${t.name}</div>
          <div class="total ${t.total<0?'good':t.total>0?'bad':''}">${fmt(t.total)}</div>
        </div>
        <div class="players">
          ${t.picks.map((p,i)=>`
            <div class="player">
              <span>${p}</span>
              <span>${fmt(data.leaderboard[p])}</span>
            </div>`).join("")}
        </div>
      </div>`;
  });
}

function copyWhatsApp(){
  let text="🏌️‍♂️ MASTERS AUGUSTA 2026\n🏆 RANKING\n\n";
  [...document.querySelectorAll('.rank-row')].forEach(r=>text+=r.textContent+"\n");
  navigator.clipboard.writeText(text);
  alert("Ranking copiado ✅");
}

render();
</script>
</body>
</html>
